<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes float {
    0%{transform:translateY(0)}
    50%{transform:translateY(-30px)}
    100%{transform:translateY(0)}
    }
    
    .animate-float{
    animation: float 4s ease-in-out infinite;
    }
</style>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen  bg-gradient-to-r from-red-500 to-red-700">


<!-- WhatsApp Floating Button -->
<a href="https://wa.me/2340000000000" target="_blank"
class="fixed bottom-6 right-6 bg-green-500 p-4 rounded-full shadow-lg hover:bg-green-600 transition">

<svg xmlns="http://www.w3.org/2000/svg" 
width="28" height="28" fill="white" viewBox="0 0 24 24">
<path d="M20.52 3.48A11.91 11.91 0 0012.05 0C5.48 0 .11 5.37.11 11.94c0 2.1.55 4.15 1.6 5.96L0 24l6.3-1.64a11.92 11.92 0 005.75 1.46h.01c6.57 0 11.94-5.37 11.94-11.94 0-3.19-1.24-6.19-3.48-8.4zM12.06 21.6c-1.79 0-3.54-.48-5.07-1.39l-.36-.21-3.74.97.99-3.65-.23-.37a9.52 9.52 0 01-1.47-5.01c0-5.26 4.28-9.54 9.54-9.54 2.55 0 4.95.99 6.75 2.79a9.48 9.48 0 012.79 6.75c0 5.26-4.28 9.54-9.54 9.54zm5.23-7.14c-.29-.14-1.7-.84-1.96-.94-.26-.1-.45-.14-.64.14-.19.29-.73.94-.9 1.13-.16.19-.33.21-.62.07-.29-.14-1.22-.45-2.32-1.43-.86-.77-1.44-1.72-1.61-2.01-.17-.29-.02-.44.13-.58.13-.13.29-.33.43-.5.14-.17.19-.29.29-.48.1-.19.05-.36-.02-.5-.07-.14-.64-1.55-.88-2.12-.23-.56-.47-.49-.64-.5l-.55-.01c-.19 0-.5.07-.76.36-.26.29-1 1-1 2.43 0 1.43 1.03 2.81 1.18 3 .14.19 2.03 3.1 4.91 4.34.69.3 1.22.48 1.64.62.69.22 1.32.19 1.82.11.56-.08 1.7-.69 1.94-1.35.24-.67.24-1.24.17-1.35-.07-.12-.26-.19-.55-.33z"/>
</svg>

</a>



<div class="bg-white shadow-lg bg-gradient-to-r from-red-500 to-red-700 rounded-xl animate-float w-full max-w-md p-8">

<h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
Create Account
</h2>

<form class="space-y-4">


     
<!-- Full Name -->
<div>
<label class="block text-sm text-gray-600 mb-1">First Name</label>
<input type="text"
class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none"
placeholder="Enter your name">
</div>

<!-- Email -->
<div>
<label class="block text-sm text-gray-600 mb-1">Email</label>
<input type="email"
class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none"
placeholder="Enter your email">
</div>

<!-- Password -->
<div>
<label class="block text-sm text-gray-600 mb-1">last name</label>
<input type="text"
class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none"
placeholder="last name ">
</div>



<div>
    <label class="block text-sm text-gray-600 mb-1">Country</label>
    <select class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none">
    <option value="">Select your country</option>
    <option>Nigeria</option>
    <option>Ghana</option>
    <option>Kenya</option>
    <option>South Africa</option>
    <option>United States</option>
    <option>United Kingdom</option>
    <option>Canada</option>
    </select>
    </div>


<!-- Confirm Password -->
<div>
<label class="block text-sm text-gray-600 mb-1">Username</label>
<input type="password"
class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none"
placeholder="Confirm password">
</div>


<!-- Gender Radio -->
<div>
    <label class="block text-sm text-gray-600 mb-2">Gender</label>
    
    <div class="flex gap-6">
    
    <label class="flex items-center gap-2">
    <input type="radio" name="gender" class="text-green-600 focus:ring-green-500">
    <span class="text-sm text-gray-700">Male</span>
    </label>
    
    <label class="flex items-center gap-2">
    <input type="radio" name="gender" class="text-green-600 focus:ring-green-500">
    <span class="text-sm text-gray-700">Female</span>
    </label>
    
    <label class="flex items-center gap-2">
    <input type="radio" name="gender" class="text-green-600 focus:ring-green-500">
    <span class="text-sm text-gray-700">Other</span>
    </label>
    
    </div>
    </div>

<!-- Button -->
<button
class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">
Sign Up
</button>

<!-- Login link -->
<p class="text-sm text-center text-gray-600 mt-4">
Already have an account?
<a href="#" class="text-green-600 font-medium hover:underline">
Login
</a>
</p>

</form>

</div>

</body>
</html>
