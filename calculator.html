
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#0ea5e9'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center min-h-screen text-white">

  <!-- Calculator Card -->
  <div class="backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl rounded-3xl p-5 w-full max-w-sm">
    
    <!-- Title -->
    <h1 class="text-center text-xl font-semibold mb-3 tracking-wide">Smart Calculator</h1>

    <!-- Display -->
    <div class="bg-black/40 rounded-xl p-3 mb-4">
      <input
        type="text"
        id="display"
        class="w-full bg-transparent text-right text-3xl focus:outline-none"
        disabled
      />
    </div>

    <!-- Buttons -->
    <div class="grid grid-cols-4 gap-3">
      <button onclick="clearDisplay()" class="btn col-span-2 bg-red-500/80">C</button>
      <button onclick="deleteLast()" class="btn bg-yellow-400/80">DEL</button>
      <button onclick="append('/')" class="btn operator">÷</button>

      <button onclick="append('7')" class="btn">7</button>
      <button onclick="append('8')" class="btn">8</button>
      <button onclick="append('9')" class="btn">9</button>
      <button onclick="append('*')" class="btn operator">×</button>

      <button onclick="append('4')" class="btn">4</button>
      <button onclick="append('5')" class="btn">5</button>
      <button onclick="append('6')" class="btn">6</button>
      <button onclick="append('-')" class="btn operator">−</button>

      <button onclick="append('1')" class="btn">1</button>
      <button onclick="append('2')" class="btn">2</button>
      <button onclick="append('3')" class="btn">3</button>
      <button onclick="append('+')" class="btn operator">+</button>

      <button onclick="append('0')" class="btn col-span-2">0</button>
      <button onclick="append('.')" class="btn">.</button>
      <button onclick="calculate()" class="btn equals">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function append(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (!isNaN(e.key) || ['+', '-', '*', '/', '.'].includes(e.key)) {
        append(e.key);
      } else if (e.key === 'Enter') {
        calculate();
      } else if (e.key === 'Backspace') {
        deleteLast();
      } else if (e.key === 'Escape') {
        clearDisplay();
      }
    });
  </script>

  <style>
    .btn {
      @apply h-14  text-lg font-semibold bg-white/20 hover:bg-white/30 active:scale-95 transition-all duration-150 shadow-inner;
    }

    .operator {
      @apply  hover:bg-primary;
    }

    .equals {
      @apply bg-green-500  text-white;
    }
  </style>

</body>
</html>
